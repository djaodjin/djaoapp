<div id="Recap"></div>
<script type="text/javascript" {{request|csp_nonce}}>
  var RecaptchaOptions = {{options}};
  Recaptcha.create("{{public_key}}",
    "Recap",
    {
      theme: RecaptchaOptions['theme'] || "red",
      callback: Recaptcha.focus_response_field
    },
    RecaptchaOptions
  );
</script>
